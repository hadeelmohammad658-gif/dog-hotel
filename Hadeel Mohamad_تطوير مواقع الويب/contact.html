    <div class="form-container">
        <h2>تفاصيل الاتصال</h2>
        <p class="form-subtitle">أدخل التفاصيل الخاصة بك لتلقي النشرة الإخبارية الشهرية</p>
        
        <form>
            <div class="form-group-custom">
                <label>الاسم الأول:</label>
                <input type="text" required>
            </div>
            <div class="form-group-custom">
                <label>اسم العائلة:</label>
                <input type="text" required>
            </div>
            <div class="form-group-custom">
                <label>النوع:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender"> ذكر</label>
                    <label><input type="radio" name="gender"> أنثى</label>
                </div>
            </div>
            <div class="form-group-custom">
                <label>كيف تود أن تصلك رسائلنا؟</label>
                <div class="check-group">
                    <label><input type="checkbox"> عبر البريد الإلكتروني</label>
                    <label><input type="checkbox"> عن طريق الهاتف</label>
                    <label><input type="checkbox"> عن طريق البريد</label>
                </div>
            </div>
            <div class="form-group-custom">
                <label>رسالتك:</label>
                <textarea placeholder="اكتب رسالتك هنا..."></textarea>
            </div>
            <button type="submit" class="btn-submit-blue">إرسال</button>
        </form>
    </div>
