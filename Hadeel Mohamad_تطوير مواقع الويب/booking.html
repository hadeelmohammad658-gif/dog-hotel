                <div class="أيقونةالهاتف" id="hamburger-btn"> ☰ </div>           
            
           <div class="أدوات-الوصول">
                <button onclick="changeFontSize('increase')" title="تكبير">A+</button>
                <button onclick="changeFontSize('decrease')" title="تصغير">A-</button>
                <button onclick="speakText()" title="استمع"><i class="fas fa-volume-up"></i></button>
            </div>
        </nav>
    </div>
</header>

<main>
    <section class="عنوان-الصفحة">
        <h1>حجز إقامة شاملة</h1>
        <p>صمم تجربة أليفك الخاصة عن طريق اختيار الخدمات المناسبة</p>
    </section>

    <div class="حاوية-النموذج">
        <form id="نموذج-الحجز">
            <div class="مجموعة-حقول">
                <label for="owner-name">اسم المالك:</label>
                <input type="text" id="owner-name" required placeholder="أدخل اسمك بالكامل">
            </div>
            <div class="مجموعة-حقول">
                <label for="dog-name">اسم الكلب:</label>
                <input type="text" id="dog-name" required placeholder="ما هو اسم أليفك؟">
            </div>
            <div class="مجموعة-حقول">
                <label for="phone">رقم الهاتف:</label>
                <input type="tel" id="phone" required placeholder="05xxxxxxxx">
            </div>

            <hr class="فاصل-بصري">

            <div class="مجموعة-حقول">
                <label><i class="fas fa-bed"></i> نوع الغرفة والمرافق:</label>
                <select id="room-select" class="قائمة-اختيار">
                    <option value="none">اختر الغرفة...</option>
                    <option value="standard">غرفة قياسية مريحة ($50)</option>
                    <option value="luxury">أجنحة فاخرة ($80)</option>
                    <option value="visual">غرفة الترفيه البصري ($70)</option>
                    <option value="play">صالة اللعب الداخلية ($30)</option>
                </select>
            </div>

            <div class="مجموعة-حقول">
                <label><i class="fas fa-cut"></i> صالة الحلاقة والمنتجع:</label>
                <select id="grooming-select" class="قائمة-اختيار">
                    <option value="none">بدون خدمات إضافية ($0)</option>
                    <option value="pro">الحلاقة الاحترافية ($40)</option>
                    <option value="wash">الاستحمام والتنظيف ($30)</option>
                    <option value="spa">الاسترخاء والمنتجع ($25)</option>
                    <option value="nails">العناية بالأظافر والأذن ($20)</option>
                </select>
            </div>

            <div class="مجموعة-حقول">
                <label><i class="fas fa-user-md"></i> الخدمات الطبية والتوصيل:</label>
                <select id="medical-select" class="قائمة-اختيار">
                    <option value="none">بدون خدمات طبية ($0)</option>
                    <option value="vet24">طبيب بيطري 24 ساعة ($60)</option>
                    <option value="checkup">فحص بيطري وقائي ($40)</option>
                    <option value="special">رعاية طبية مخصصة ($70)</option>
                    <option value="transport">خدمة التوصيل الفاخرة ($25)</option>
                </select>
            </div>

            <div class="مجموعة-حقول">
                <label><i class="fas fa-running"></i> الأنشطة الخارجية:</label>
                <select id="activity-select" class="قائمة-اختيار">
                    <option value="none">اختر نشاطاً...</option>
                    <option value="forest">التمشية في الغابات ($15)</option>
                    <option value="grass">منطقة العشب الخاصة ($25)</option>
                    <option value="agility">مسار الرشاقة ($30)</option>
                    <option value="outdoor">المراعي الخارجية ($20)</option>
                </select>
            </div>

            <div class="عرض-السعر" style="background: #fff3e0; padding: 20px; border: 2px solid #e67e22; border-radius: 10px; margin: 20px 0; text-align: center;">
                <h2 style="color: #2c3e50; margin: 0;">الإجمالي: <span id="total-price" style="color: #e67e22;">0</span> $</h2>
            </div>

            <button type="submit" class="زر-إرسال-أزرق">إرسال طلب الحجز</button>
        </form>
    </div>
</main>
