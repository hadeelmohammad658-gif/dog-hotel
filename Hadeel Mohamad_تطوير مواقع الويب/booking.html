<section class="page-header">
    <h1>حجز إقامة شاملة</h1>
    <p>صمم تجربة أليفك الخاصة عن طريق اختيار الخدمات المناسبة</p>
</section>

<div class="form-container">
    <form id="booking-form">
        <div class="form-group-custom">
            <label>اسم المالك:</label>
            <input type="text" required placeholder="أدخل اسمك بالكامل">
        </div>

        <div class="form-group-custom">
            <label>اسم الكلب:</label>
            <input type="text" required placeholder="ما هو اسم أليفك؟">
        </div>

        <div class="form-group-custom">
            <label>رقم الهاتف:</label>
            <input type="text" required placeholder="05xxxxxxxx">
        </div>

        <hr style="margin: 20px 0; opacity: 0.2;">

        <div class="form-group-custom">
            <label><i class="fas fa-box"></i> نوع الحزمة الأساسية:</label>
            <select class="form-select">
                <option>حزمة اليوم (Day Care)</option>
                <option>الحزمة الكلاسيكية (Standard)</option>
                <option>الحزمة المميزة (VIP Suite)</option>
            </select>
        </div>

        <div class="form-group-custom">
            <label><i class="fas fa-bed"></i> نوع الغرفة والمرافق:</label>
            <select class="form-select">
                <option>غرفة عادية مريحة</option>
                <option>جناح VIP مع شاشة تلفزيون</option>
                <option>غرفة مزودة بنظام تدفئة أرضية</option>
                <option>استخدام الحظيرة الداخلية فقط</option>
            </select>
        </div>

        <div class="form-group-custom">
            <label><i class="fas fa-cut"></i> صالة الحلاقة والمنتجع:</label>
            <select class="form-select">
                <option>بدون خدمات إضافية</option>
                <option>جلسة تنظيف وحلاقة</option>
                <option>منتجع كامل ومنطقة استرخاء</option>
            </select>
        </div>

        <div class="form-group-custom">
            <label><i class="fas fa-user-md"></i> الخدمات الطبية والتوصيل:</label>
            <select class="form-select">
                <option>بدون خدمات طبية</option>
                <option>فحص بيطري (24 ساعة)</option>
                <option>خدمة التوصيل من وإلى المكان</option>
            </select>
        </div>

        <div class="form-group-custom">
            <label><i class="fas fa-running"></i> الأنشطة الخارجية:</label>
            <select class="form-select">
                <option>التمشية في الغابات</option>
                <option>تدريب مسار الرشاقة (Agility)</option>
                <option>اللعب في مساحة العشب الخاصة</option>
                <li>نشاط حفر الرمل</li>
            </select>
        </div>

        <div class="form-group-custom">
            <label>ملاحظات خاصة:</label>
            <textarea placeholder="أي تفاصيل إضافية تود إخبارنا بها؟"></textarea>
        </div>

        <button type="submit" class="btn-submit-blue">إرسال طلب الحجز</button>
    </form>
</div>
